spring.application.name=project-management-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/projectmanagementdb?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# Server
server.port=${PORT:6060}

# JWT Configuration
jwt.secret=${JWT_SECRET:T@skF0rge-Pr0ject-Mgmt-S3cr3t-K3y-2024-V3ry-L0ng-And-S3cur3}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Mail Configuration (configure via environment variables for production)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@taskforge.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# Logging (reduced noise)
logging.level.root=WARN
logging.level.com.projectmgmttool.backend=INFO
logging.level.org.springframework.security=WARN
